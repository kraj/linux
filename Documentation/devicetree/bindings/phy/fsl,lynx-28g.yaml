%YAML 1.2
---
$id: http://devicetree.org/schemas/phy/fsl,lynx-28g.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale Lynx 28G SerDes PHY

maintainers:
  - Ioana Ciornei <ioana.ciornei@nxp.com>

description:
  The Lynx 28G is a multi-lane, multi-protocol SerDes (PCIe, SATA, Ethernet)
  present in multiple instances on NXP LX2160A and LX2162A SoCs. All instances
  share a common register map and programming model, however they differ in
  supported protocols per lane in a way that is not detectable by said
  programming model without prior knowledge. The distinction is made through
  the compatible string.

properties:
  compatible:
    oneOf:
      - const: fsl,lynx-28g
        deprecated: true
        description:
          Legacy compatibility string for Lynx 28G SerDes. Any assumption
          regarding whether a certain lane supports a certain protocol may
          be incorrect. Deprecated except when used as a fallback. Use
          device-specific strings instead.
      - items:
          - const: fsl,lx2160a-serdes1
          - const: fsl,lynx-28g
      - items:
          - const: fsl,lx2160a-serdes2
          - const: fsl,lynx-28g
      - items:
          - const: fsl,lx2162a-serdes1
          - const: fsl,lynx-28g
      - items:
          - const: fsl,lx2162a-serdes2
          - const: fsl,lynx-28g
      - const: fsl,lx2160a-serdes3

  reg:
    maxItems: 1

  "#address-cells": true

  "#size-cells": true

  "#phy-cells": true

patternProperties:
  "^phy@[0-9a-f]+$":
    type: object
    description: Individual SerDes lane acting as PHY provider

    properties:
      reg:
        description: Lane index as seen in register map
        maxItems: 1

      "#phy-cells":
        const: 0

    required:
      - reg
      - "#phy-cells"

    additionalProperties: false

required:
  - compatible
  - reg

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: fsl,lynx-28g
    then:
      # Legacy case: parent is the PHY provider, cell encodes lane index
      properties:
        "#phy-cells":
          const: 1
      required:
        - "#phy-cells"

  - if:
      properties:
        compatible:
          contains:
            enum:
              - fsl,lx2160a-serdes1
              - fsl,lx2160a-serdes2
              - fsl,lx2160a-serdes3
              - fsl,lx2162a-serdes1
              - fsl,lx2162a-serdes2
    then:
      # Modern binding: lanes must have their own nodes
      properties:
        "#address-cells":
          const: 1
        "#size-cells":
          const: 0
      required:
        - "#address-cells"
        - "#size-cells"

  # LX2162A SerDes 1 has fewer lanes than the others
  - if:
      properties:
        compatible:
          contains:
            const: fsl,lx2162a-serdes1
    then:
      patternProperties:
        "^phy@[0-9a-f]+$":
          properties:
            reg:
              enum: [4, 5, 6, 7]
    else:
      patternProperties:
        "^phy@[0-9a-f]+$":
          properties:
            reg:
              enum: [0, 1, 2, 3, 4, 5, 6, 7]

additionalProperties: false

examples:
  - |
    soc {
      #address-cells = <2>;
      #size-cells = <2>;

      serdes_1: serdes@1ea0000 {
        compatible = "fsl,lx2160a-serdes1", "fsl,lynx-28g";
        reg = <0x0 0x1ea0000 0x0 0x1e30>;
        #address-cells = <1>;
        #size-cells = <0>;
        #phy-cells = <1>;

        phy@0 {
          reg = <0>;
          #phy-cells = <0>;
        };

        phy@1 {
          reg = <1>;
          #phy-cells = <0>;
        };

        phy@2 {
          reg = <2>;
          #phy-cells = <0>;
        };

        phy@3 {
          reg = <3>;
          #phy-cells = <0>;
        };

        phy@4 {
          reg = <4>;
          #phy-cells = <0>;
        };

        phy@5 {
          reg = <5>;
          #phy-cells = <0>;
        };

        phy@6 {
          reg = <6>;
          #phy-cells = <0>;
        };

        phy@7 {
          reg = <7>;
          #phy-cells = <0>;
        };
      };
    };
