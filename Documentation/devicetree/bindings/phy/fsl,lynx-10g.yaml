%YAML 1.2
---
$id: http://devicetree.org/schemas/phy/fsl,lynx-10g.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale Lynx 10G SerDes PHY

description:
  The Lynx 10G is a multi-protocol SerDes block which handles networking, PCIe,
  SATA and other high-speed interfaces. It is present on most QorIQ and
  Layerscape SoCs. The integration is SoC-specific, with the differences
  consisting in register endianness, the number of lanes, protocol converters
  available per lane and their location in the PCCR registers. Some SoCs have
  multiple SerDes blocks and those differ in their protocol capabilities per
  lane.

maintainers:
  - Vladimir Oltean <vladimir.oltean@nxp.com>

properties:
  compatible:
    enum:
      - fsl,ls1028a-serdes
      - fsl,ls1046a-serdes1
      - fsl,ls1046a-serdes2
      - fsl,ls1088a-serdes1
      - fsl,ls2088a-serdes1
      - fsl,ls2088a-serdes2

  reg:
    maxItems: 1

  big-endian: true

  "#address-cells":
    const: 1
    description: Address cells for child lane nodes

  "#size-cells":
    const: 0
    description: Size cells for child lane nodes

patternProperties:
  "^phy@[0-9a-f]+$":
    type: object
    description: Individual SerDes lane acting as PHY provider

    properties:
      reg:
        description: |
          Lane logical number (lane A corresponds to 0). This number
          corresponds to the lane as visible in the SerDes IP's registers
          (such as LNaPSSR0), and this may not be necessarily identical to
          the lane numbering scheme from the SoC's pinout.
        maxItems: 1

      "#phy-cells":
        description: Number of cells in PHY specifier for this lane
        const: 0

    required:
      - reg
      - "#phy-cells"

    additionalProperties: false

required:
  - compatible
  - reg
  - "#address-cells"
  - "#size-cells"

additionalProperties: false

examples:
  - |
    soc {
      #address-cells = <2>;
      #size-cells = <2>;

      serdes_1: serdes@1ea0000 {
        compatible = "fsl,ls1028a-serdes";
        reg = <0x0 0x1ea0000 0x0 0xffff>;
        #address-cells = <1>;
        #size-cells = <0>;

        phy@0 {
          reg = <0>;
          #phy-cells = <0>;
        };

        phy@1 {
          reg = <1>;
          #phy-cells = <0>;
        };

        phy@2 {
          reg = <2>;
          #phy-cells = <0>;
        };

        phy@3 {
          reg = <3>;
          #phy-cells = <0>;
        };
      };
    };
